# DEV-ONLY credentials. Regenerate with:
#   docker run --rm eclipse-mosquitto:2 \
#     mosquitto_passwd -c -b /tmp/p eirvah eirvah-dev-password
# Then paste the hashed line below.
# Replace before use in any shared or lab environment.
apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-passwd
type: Opaque
stringData:
  passwd: |
    eirvah:$7$101$REPLACE_WITH_REAL_HASH$==
