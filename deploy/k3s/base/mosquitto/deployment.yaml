apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  labels: { app.kubernetes.io/name: mosquitto }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: mosquitto }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mosquitto }
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - { name: mqtt, containerPort: 1883 }
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config
            - name: passwd
              mountPath: /mosquitto/passwd
              readOnly: true
          readinessProbe:
            tcpSocket: { port: 1883 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 1883 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
            items:
              - key: mosquitto.conf
                path: mosquitto.conf
        - name: passwd
          secret:
            secretName: mosquitto-passwd
