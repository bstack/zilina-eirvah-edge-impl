apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: eirvah-prometheus
        access: proxy
        url: http://prometheus.eirvah-edge.svc.cluster.local:9090
        isDefault: true
        editable: false
