apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: EirVah
        orgId: 1
        folder: EirVah
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
