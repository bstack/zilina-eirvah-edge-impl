apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels: { app.kubernetes.io/name: nats }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: nats }
  template:
    metadata:
      labels: { app.kubernetes.io/name: nats }
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-m", "8222"]
          ports:
            - { name: client,  containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
