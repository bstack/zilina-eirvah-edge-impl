apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels: { app.kubernetes.io/name: rabbitmq }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: rabbitmq }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports:
            - { name: amqp,       containerPort: 5672 }
            - { name: management, containerPort: 15672 }
            - { name: prometheus, containerPort: 15692 }
          volumeMounts:
            - name: config
              mountPath: /etc/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "status"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap:
            name: rabbitmq-config
            items:
              - { key: rabbitmq.conf,    path: rabbitmq.conf }
              - { key: enabled_plugins,  path: enabled_plugins }
              - { key: definitions.json, path: definitions.json }
