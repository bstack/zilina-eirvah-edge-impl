[pytest]
minversion = 8.0
testpaths =
    libs
    services
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
asyncio_mode = auto
markers =
    integration: integration tests that require external services
    slow: tests that take longer to run
